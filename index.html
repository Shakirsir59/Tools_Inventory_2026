        // Render Dashboard Elements
        function initDashboard() {
            renderCounters();
            renderCards();
            renderPieChart();
        }

        // Calculate and Render Counters
        function renderCounters() {
            const employees = [...new Set(masterInventory.map(i => i.employee))];
            const sims = masterInventory.filter(i => i.item.includes("SIM")).length;
            const hardware = masterInventory.filter(i => i.category === "Telecom Hardware").length;
            const deficiencies = masterInventory.filter(i => i.status === "Need" || i.status === "Damage").length;

            document.getElementById('countPersonnel').innerText = employees.length;
            document.getElementById('countSims').innerText = sims;
            document.getElementById('countHardware').innerText = hardware;
            document.getElementById('countDeficiencies').innerText = deficiencies;
        }

        // Render Cards Dynamically
        function renderCards() {
            const container = document.getElementById('ledgersContainer');
            container.innerHTML = '';
            const employees = [...new Set(masterInventory.map(item => item.employee))];

            employees.forEach((emp, index) => {
                const empItems = masterInventory.filter(item => item.employee === emp);
                const telecomItems = empItems.filter(item => item.category === "Telecom Hardware");
                const riggerItems = empItems.filter(item => item.category === "Rigger Safety");
                const hasIssue = empItems.some(i => i.status === "Need" || i.status === "Damage");

                let telecomHTML = '';
                telecomItems.forEach(i => {
                    let badgeColor = 'bg-emerald-100 text-emerald-800';
                    if (i.status === 'Need') badgeColor = 'bg-rose-100 text-rose-800';
                    if (i.status === 'Damage') badgeColor = 'bg-red-600 text-white';
                    if (i.status === 'Not Issued') badgeColor = 'bg-slate-200 text-slate-700';

                    telecomHTML += `
                        <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-100 text-xs">
                            <div>
                                <div class="font-semibold text-slate-700">${i.item}</div>
                                <div class="text-[10px] font-mono text-slate-400">S/N: ${i.serial}</div>
                            </div>
                            <span class="${badgeColor} text-[10px] font-bold px-2 py-0.5 rounded-sm">${i.status}</span>
                        </div>
                    `;
                });

                let riggerHTML = '';
                riggerItems.forEach(i => {
                    let riggerBadge = i.status === 'Need' ? 'bg-rose-100 text-rose-800 border-rose-300' : 'bg-amber-50 text-amber-800 border-amber-200';
                    riggerHTML += `<span class="${riggerBadge} border text-[10px] font-medium px-2 py-1 rounded-md m-0.5 inline-block">${i.item}: ${i.serial}</span>`;
                });

                const cardHTML = `
                    <div class="card bg-white p-5 rounded-xl ${hasIssue ? 'border-2 border-red-300 shadow-sm' : 'border border-slate-100'} flex flex-col justify-between" data-name="${emp.toLowerCase()}">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="font-bold text-slate-800 text-base">${emp}</h3>
                                    <span class="text-xs text-slate-400 font-mono">System ID: #N-${index + 1}</span>
                                </div>
                                <button onclick="triggerEdit('${emp}')" class="text-xs text-blue-600 font-semibold cursor-pointer hover:underline"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                            </div>
                            <div class="mt-4">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1 mb-2"><i class="fa-solid fa-laptop text-indigo-500"></i> IT & Telecom System</span>
                                <div class="space-y-1.5 max-h-60 overflow-y-auto pr-1">${telecomHTML}</div>
                            </div>
                            <div class="mt-4"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1 mb-2"><i class="fa-solid fa-helmet-safety text-amber-500"></i> Rigger & Safety Assets</span>
                                <div class="flex flex-wrap">${riggerHTML || '<p class="text-xs text-slate-400 italic">No Field Gears Logged</p>'}</div>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-100 flex justify-between items-center text-xs">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">System Status</span>
                            <span class="font-semibold ${hasIssue ? 'text-rose-600':'text-emerald-600'}">${hasIssue ? 'Action Required' : 'Working'}</span>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // Generate or Update Chart.js Pie Chart
        function renderPieChart() {
            const counts = {};
            masterInventory.forEach(i => {
                if(i.category === "Telecom Hardware") {
                    counts[i.item] = (counts[i.item] || 0) + 1;
                }
            });

            // Sort and take top items for clean Pie visual
            const labels = Object.keys(counts);
            const dataValues = Object.values(counts);

            const ctx = document.getElementById('telecomPieChart').getContext('2d');
            if (pieChartInstance) { pieChartInstance.destroy(); }

            pieChartInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels.slice(0,6).concat(['Others']),
                    datasets: [{
                        data: dataValues.slice(0,6).concat([dataValues.slice(6).reduce((a, b) => a + b, 0)]),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#94a3b8'],
                        borderWidth: 1
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } } } }
            });
        }

        // Secured Edit Trigger Logic
        function triggerEdit(employeeName) {
            const pass = prompt("Enter Admin Password to Edit Items:");
            if (pass !== "Admin@North2026") {
                alert("Galat Password! Access Denied.");
                return;
            }

            const empItems = masterInventory.filter(i => i.employee === employeeName);
            let optionsStr = empItems.map((i, idx) => `${idx + 1}. ${i.item} (Current: ${i.status})`).join("\n");
            
            const selection = prompt(`Kounsa item edit karna chahte hain? Number daalein:\n\n${optionsStr}`);
            const selectedIdx = parseInt(selection) - 1;

            if (selectedIdx >= 0 && selectedIdx < empItems.length) {
                const targetItem = empItems[selectedIdx];
                const newStatus = prompt(`Naya Status enter karein:\nOptions: Working, Need, Damage, Not Issued`, targetItem.status);
                
                if (['Working', 'Need', 'Damage', 'Not Issued'].includes(newStatus)) {
                    // Update main array directly
                    targetItem.status = newStatus;
                    alert("Status successfully update ho gaya!");
                    // Trigger real time view updates
                    initDashboard();
                } else if(newStatus !== null) {
                    alert("Galat option! Status sirf Working, Need, Damage, ya Not Issued ho sakta hai.");
                }
            }
        }

        // Filter Function for Search
        function filterCards() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const name = card.getAttribute('data-name');
                card.style.display = name.includes(query) ? "flex" : "none";
            });
        }

        // Functional CSV/Excel Export Engine
        function exportToExcel() {
            let csvContent = "data:text/csv;charset=utf-8,Employee Name,Asset Category,Model/Tool Name,Serial/IMEI/Quantity,Status\n";
            masterInventory.forEach(r => {
                csvContent += `"${r.employee}","${r.category}","${r.item}","${r.serial}","${r.status}"\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "North_Region_Live_Inventory.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Start Dashboard on load
        window.onload = initDashboard;
    </script>
</body>
</html>
